<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Form Fallback</title>
</head>
<body>
  <!-- This hidden form tells Netlify's bots exactly what inputs to look for -->
  <form name="pc-intake-form" data-netlify="true" hidden>
    <input type="hidden" name="form-name" value="pc-intake-form" />
    <input type="text" name="customer-name" />
    <input type="text" name="gpu-model" />
    <!-- Add any other input names you use in your React code here -->
  </form>
</body>
</html>
